name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest -q

  build-exe:
    if: github.event_name == 'push'
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Build standalone EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name deepgram-stt --specpath build --collect-submodules pynput --collect-submodules sounddevice --collect-binaries sounddevice --collect-data sounddevice app_bootstrap.py
          Copy-Item .env.example dist\.env.example -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepgram-stt-windows
          path: |
            dist\deepgram-stt.exe
            dist\.env.example
